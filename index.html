<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REASTIC STUDIO - Photobox Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="brand">
                <h1>REASTIC<span>STUDIO</span></h1>
                <p>High-Precision Photobox Engine</p>
            </div>
            
            <div class="control-group">
                <label class="section-title">1. SETUP TEMPLATE</label>
                <label class="upload-label">
                    <span>✨ Scan PNG Transparan</span>
                    <input type="file" id="magicScan" accept="image/png">
                </label>
            </div>

            <div id="editPanel" class="control-group active-editor" style="display: none;">
                <label class="section-title">2. PHOTO EDITOR</label>
                <div class="slider-item">
                    <div class="slider-info"><span>🔍 Zoom</span> <b id="val-scale">1.0</b></div>
                    <input type="range" id="imgScale" min="0.1" max="4" step="0.01" value="1">
                </div>
                <div class="slider-item">
                    <div class="slider-info"><span>☀️ Brightness</span> <b id="val-bright">100%</b></div>
                    <input type="range" id="imgBright" min="0" max="200" value="100">
                </div>
                <div class="slider-item">
                    <div class="slider-info"><span>🌓 Contrast</span> <b id="val-contrast">100%</b></div>
                    <input type="range" id="imgContrast" min="0" max="200" value="100">
                </div>
                <div class="slider-item">
                    <div class="slider-info"><span>🌈 Saturation</span> <b id="val-sat">100%</b></div>
                    <input type="range" id="imgSat" min="0" max="200" value="100">
                </div>
            </div>

            <div class="control-group">
                <label class="section-title">3. EXPORT & PRINT</label>
                <div class="action-buttons">
                    <button id="downloadBtn" class="primary-btn">💾 SIMPAN HASIL HD</button>
                    <button id="printBtn" class="print-btn">🖨️ CETAK SEKARANG (4R)</button>
                </div>
            </div>
        </aside>

        <main class="viewport">
            <div id="captureArea" class="canvas-print">
                <div id="photoContainer"></div>
                <img id="templateOverlay" alt="Overlay">
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
